app = "meta-minions"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  WORKSPACE_ROOT = "/workspace"
  GOOSE_PROVIDER = "claude-acp"
  GOOSE_MODEL = "default"
  HOME = "/workspace/home"
  IS_SANDBOX = "true"
  ENABLE_BROWSER_MCP = "true"
  PLAYWRIGHT_BROWSERS_PATH = "/opt/pw-browsers"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/api/sessions"

[[mounts]]
  source = "workspace_data"
  destination = "/workspace"

[[vm]]
  size = "shared-cpu-4x"
  memory = "4gb"
  auto_stop = false
